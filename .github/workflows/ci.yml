name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'codex/**'
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validation smoke tests
        run: npm test

      - name: Typecheck
        run: npm run lint

      - name: Build static app
        run: npm run build

      - name: Upload static build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error
          retention-days: 7
